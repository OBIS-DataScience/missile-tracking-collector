name: Missile Data Collection

# Runs every 30 minutes — small lightweight pulls (max 5 events each)
# to stay under the Anthropic API rate limit of 30k input tokens/minute
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt anthropic

      - name: Run scheduled collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.scheduled_collection

      - name: Run Monte Carlo simulation
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.simulation
