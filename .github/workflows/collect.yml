name: Missile Data Collection

# Runs every 2 hours at the top of the hour (UTC)
# Schedule: 12:00 AM, 2:00 AM, 4:00 AM, ... 10:00 PM (12 runs/day)
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt anthropic

      - name: Run scheduled collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.scheduled_collection

      - name: Run Monte Carlo simulation
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.simulation
