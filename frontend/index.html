<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time 3D intelligence dashboard tracking global missile strikes, drone attacks, and conflict activity across active war zones." />

    <!-- Open Graph — controls the preview card when the URL is shared
         on social media, Slack, iMessage, LinkedIn, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="THREATNET | Global Strike Monitor" />
    <meta property="og:description" content="Real-time 3D intelligence dashboard tracking global missile strikes, drone attacks, and conflict activity across active war zones." />
    <meta property="og:image" content="https://threatnet.world/Front_Interface_2.png" />
    <meta property="og:url" content="https://threatnet.world" />
    <meta property="og:site_name" content="THREATNET" />

    <!-- Twitter/X card — same idea but specifically for Twitter previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="THREATNET | Global Strike Monitor" />
    <meta name="twitter:description" content="Real-time 3D intelligence dashboard tracking global missile strikes, drone attacks, and conflict activity across active war zones." />
    <meta name="twitter:image" content="https://threatnet.world/Front_Interface_2.png" />

    <title>THREATNET | Global Strike Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking render — the page displays immediately
         with fallback fonts, then swaps in custom fonts once downloaded -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  </head>
  <body class="bg-[#0B0F1A] text-white overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
